  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

R · INK SCALE (anchored 500 = brand) ---------- */\n  --ink-50:  #F4F6FA;\n  --ink-100: #E4E9F1;\n  --ink-200: #C7D1E0;\n  --ink-300: #9DABC2;\n  --ink-400: #6F82A0;\n  --ink-500: #4B5E7A;\n  --ink-600: #3C4D67;\n  --ink-700: #303D52;\n  --ink-800: #283346;\n  --ink-900: #1F2737;\n  --ink-950: #131A26;\n\n  /* ---------- COLOR · SEMANTIC ---------- */\n  --color-success: #10B981;\n  --color-success-bg: rgba(16, 185, 129, 0.12);\n  --color-warning: #F59E0B;\n  --color-warning-bg: rgba(245, 158, 11, 0.12);\n  --color-danger: #EF4444;\n  --color-danger-bg: rgba(239, 68, 68, 0.12);\n  --color-info: var(--azure-500);\n  --color-info-bg: rgba(61, 114, 245, 0.12);\n\n  /* ---------- COLOR · SEMANTIC SURFACE (DARK MODE DEFAULT) ---------- */\n  --bg-base: var(--navy-950);\n  --bg-surface: #0E1D33;\n  --bg-elevated: #142844;\n  --bg-overlay: rgba(10, 22, 40, 0.85);\n  --bg-hover: rgba(255, 255, 255, 0.04);\n  --bg-active: rgba(255, 255, 255, 0.08);\n\n  --border-subtle: rgba(255, 255, 255, 0.06);\n  --border-default: rgba(255, 255, 255, 0.10);\n  --border-strong: rgba(255, 255, 255, 0.16);\n  --border-focus: var(--azure-500);\n\n  --text-primary: #FFFFFF;\n  --text-secondary: var(--ink-200);\n  --text-tertiary: var(--ink-300);\n  --text-muted: var(--ink-400);\n  --text-disabled: var(--ink-600);\n  --text-inverse: var(--navy-950);\n  --text-accent: var(--azure-400);\n\n  /* ---------- TYPOGRAPHY · FAMILIES ---------- */\n  --font-sans: \"DM Sans\", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;\n  --font-serif: \"Source Serif 4\", \"Iowan Old Style\", Georgia, serif;\n  --font-mono: \"DM Mono\", \"SF Mono\", \"Roboto Mono\", monospace;\n\n  /* ---------- TYPOGRAPHY · SCALE ---------- */\n  --text-2xs: 0.6875rem;\n  --text-xs:  0.75rem;\n  --text-sm:  0.875rem;\n  --text-base: 1rem;\n  --text-lg:  1.125rem;\n  --text-xl:  1.25rem;\n  --text-2xl: 1.5rem;\n  --text-3xl: 1.875rem;\n  --text-4xl: 2.25rem;\n  --text-5xl: 3rem;\n  --text-6xl: 3.75rem;\n  --text-7xl: 4.5rem;\n  --text-8xl: 6rem;\n\n  /* ---------- TYPOGRAPHY · WEIGHT ---------- */\n  --weight-light: 300;\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* ---------- TYPOGRAPHY · LINE HEIGHT ---------- */\n  --leading-tight: 1.05;\n  --leading-snug: 1.2;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.65;\n\n  /* ---------- TYPOGRAPHY · TRACKING ---------- */\n  --tracking-tighter: -0.04em;\n  --tracking-tight: -0.02em;\n  --tracking-normal: 0;\n  --tracking-wide: 0.04em;\n  --tracking-wider: 0.12em;\n\n  /* ---------- SPACING (4px base) ---------- */\n  --space-0: 0;\n  --space-1: 0.25rem;\n  --space-2: 0.5rem;\n  --space-3: 0.75rem;\n  --space-4: 1rem;\n  --space-5: 1.25rem;\n  --space-6: 1.5rem;\n  --space-8: 2rem;\n  --space-10: 2.5rem;\n  --space-12: 3rem;\n  --space-16: 4rem;\n  --space-20: 5rem;\n  --space-24: 6rem;\n  --space-32: 8rem;\n\n  /* ---------- BORDER RADIUS ---------- */\n  --radius-none: 0;\n  --radius-sm: 4px;\n  --radius-md: 6px;       /* Buttons, inputs */\n  --radius-lg: 10px;      /* Cards */\n  --radius-xl: 14px;      /* Large surfaces */\n  --radius-2xl: 20px;\n  --radius-full: 9999px;  /* Pills, avatars only — never on buttons */\n\n  /* ---------- ELEVATION (DARK-OPTIMIZED) ---------- */\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.30);\n  --shadow-md: 0 4px 8px rgba(0,0,0,0.40), 0 1px 2px rgba(0,0,0,0.30);\n  --shadow-lg: 0 12px 24px rgba(0,0,0,0.45), 0 2px 4px rgba(0,0,0,0.30);\n  --shadow-xl: 0 24px 48px rgba(0,0,0,0.50), 0 4px 8px rgba(0,0,0,0.30);\n  --shadow-glow-azure: 0 0 0 1px rgba(37,99,235,0.30), 0 8px 32px rgba(37,99,235,0.25);\n\n  /* ---------- MOTION ---------- */\n  --duration-instant: 80ms;\n  --duration-fast: 150ms;\n  --duration-base: 220ms;\n  --duration-slow: 360ms;\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);\n\n  /* ---------- LAYOUT ---------- */\n  --container-max: 1200px;\n  --container-narrow: 760px;\n}\n\n/* ============================================================\n   SEMANTIC TYPE CLASSES\n   ============================================================ */\n.t-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--text-xs);\n  font-weight: var(--weight-medium);\n  letter-spacing: var(--tracking-wider);\n  text-transform: uppercase;\n  color: var(--text-accent);\n}\n\n.t-display {\n  font-family: var(--font-serif);\n  font-weight: var(--weight-regular);\n  font-size: clamp(3rem, 7vw, var(--text-8xl));\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tighter);\n  color: var(--text-primary);\n}\n.t-display em {\n  font-style: italic;\n  color: var(--azure-300);\n  font-weight: 400;\n}\n\n.t-h1 {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-semibold);\n  font-size: clamp(2rem, 4vw, var(--text-5xl));\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-tight);\n}\n\n.t-h2 {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-3xl);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-tight);\n}\n\n.t-h3 {\n  font-family: var(--font-sans);\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-xl);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-tight);\n}\n\n.t-body { font-size: var(--text-base); line-height: var(--leading-relaxed); color: var(--text-secondary); }\n.t-body-lg { font-size: var(--text-lg); line-height: var(--leading-relaxed); color: var(--text-secondary); }\n.t-small { font-size: var(--text-sm); color: var(--text-tertiary); }\n\n.t-mono {\n  font-family: var(--font-mono);\n  font-size: var(--text-sm);\n  color: var(--azure-300);\n}\n\n/* ============================================================\n   BASE RESET (apply on body)\n   ============================================================ */\n.fleway-body {\n  font-family: var(--font-sans);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  color: var(--text-primary);\n  background: var(--bg-base);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  text-rendering: optimizeLegibility;\n  font-optical-sizing: auto;\n  font-feature-settings: \"ss01\", \"ss02\", \"cv11\";\n}\n</style>\n<style>\n  deck-stage:not(:defined) { visibility: hidden; }\n\n  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }\n\n  :root {\n    --slide-pad-x: 110px;\n    --slide-pad-y: 90px;\n    --slide-pad-bottom: 100px;\n    --type-display: 88px;\n    --type-title: 64px;\n    --type-subtitle: 32px;\n    --type-h3: 36px;\n    --type-body: 26px;\n    --type-small: 22px;\n    --type-mono: 20px;\n    --type-mono-sm: 16px;\n    --gap-title: 40px;\n    --gap-section: 56px;\n    --gap-item: 24px;\n  }\n\n  html, body { height: 100%; background: var(--bg-base); }\n  body {\n    font-family: var(--font-sans);\n    color: var(--text-primary);\n    -webkit-font-smoothing: antialiased;\n    -moz-osx-font-smoothing: grayscale;\n    text-rendering: optimizeLegibility;\n    font-optical-sizing: auto;\n    font-feature-settings: \"ss01\", \"ss02\", \"cv11\";\n  }\n  ::selection { background: var(--azure-600); color: var(--white); }\n\n  /* ============================================================\n     SLIDE BASE\n     ============================================================ */\n  deck-stage > section {\n    background: var(--bg-base);\n    color: var(--text-primary);\n    padding: var(--slide-pad-y) var(--slide-pad-x) var(--slide-pad-bottom);\n    position: relative;\n    overflow: hidden;\n    display: flex;\n    flex-direction: column;\n  }\n  deck-stage > section.surface { background: var(--bg-surface); }\n\n  /* Ambient grid overlay — only on hero/section-headers */\n  section.with-grid::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(to right, rgba(255,255,255,0.05) 1px, transparent 1px),\n : rgba(37, 99, 235, 0.30);\n  }\n  .phase-header {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    margin-bottom: 18px;\n    padding-bottom: 14px;\n    border-bottom: 1px solid var(--border-subtle);\n  }\n  .phase-name {\n    font-family: var(--font-mono);\n    font-size: 16px;\n    font-weight: var(--weight-medium);\n    letter-spacing: var(--tracking-wider);\n    color: var(--text-primary);\n    text-transform: uppercase;\n  }\n  .phase-time {\n    font-family: var(--font-mono);\n    font-size: 13px;\n    color: var(--text-muted);\n    font-weight: var(--weight-medium);\n    letter-spacing: var(--tracking-wide);\n    text-transform: uppercase;\n  }\n  .phase-desc {\n    font-size: 18px;\n    color: var(--text-tertiary);\n    line-height: 1.5;\n    margin-bottom: 18px;\n  }\n  .phase-deliverables { list-style: none; padding: 0; margin: 0; }\n  .phase-deliverables li {\n    font-size: 17px;\n    color: var(--text-secondary);\n    padding: 5px 0 5px 22px;\n    position: relative;\n    line-height: 1.4;\n  }\n  .phase-deliverables li::before {\n    content: '→';\n    position: absolute;\n    left: 0;\n    color: var(--azure-400);\n  }\n  .phase-encounters {\n    margin-top: 18px;\n    padding-top: 14px;\n    border-top: 1px solid var(--border-subtle);\n    font-family: var(--font-mono);\n    font-size: 13px;\n    letter-spacing: var(--tracking-wider);\n    text-transform: uppercase;\n    color: var(--text-muted);\n    font-weight: var(--weight-medium);\n    display: flex;\n    align-items: baseline;\n    gap: 8px;\n  }\n  .phase-encounters strong {\n    color: var(--azure-300);\n    font-family: var(--font-sans);\n    font-weight: var(--weight-bold);\n    font-size: 22px;\n    letter-spacing: var(--tracking-tight);\n  }\n\n  /* ============================================================\n     PRICE BOX\n     ============================================================ */\n  .price-box {\n    margin: 0 auto;\n    max-width: 900px;\n    padding: 64px 80px;\n    border-radius: var(--radius-xl);\n    background: var(--bg-surface);\n    border: 1px solid var(--border-strong);\n    text-align: center;\n    position: relative;\n    overflow: hidden;\n    box-shadow: var(--shadow-glow-azure);\n  }\n  .price-box::before {\n    content: '';\n    position: absolute;\n    top: -40%; left: 50%;\n    transform: translateX(-50%);\n    width: 800px; height: 800px;\n    background: radial-gradient(circle, rgba(37,99,235,0.20) 0%, transparent 60%);\n    pointer-events: none;\n  }\n  .price-label {\n    font-family: var(--font-mono);\n    font-size: 16px;\n    font-weight: var(--weight-medium);\n    letter-spacing: var(--tracking-wider);\n    color: var(--azure-300);\n    text-transform: uppercase;\n    margin-bottom: 18px;\n    position: relative;\n  }\n  .price-strike {\n    font-family: var(--font-mono);\n    text-decoration: line-through;\n    color: var(--text-muted);\n    font-size: 18px;\n    margin-bottom: 16px;\n    position: relative;\n    letter-spacing: var(--tracking-wide);\n  }\n  .price-number {\n    font-family: var(--font-serif);\n    font-size: 110px;\n    font-weight: var(--weight-regular);\n    letter-spacing: -0.04em;\n    color: var(--text-primary);\n    line-height: 1;\n    margin-bottom: 14px;\n    position: relative;\n  }\n  .price-period {\n    font-size: 22px;\n    color: var(--text-tertiary);\n    position: relative;\n    margin-bottom: 18px;\n  }\n  .price-breakdown {\n    font-family: var(--font-serif);\n    font-style: italic;\n    font-size: 20px;\n    color: var(--text-muted);\n    position: relative;\n  }\n\n  /* ============================================================\n     SECTION HEADER (full slide)\n     ============================================================ */\n  section.section-header {\n    justify-content: center;\n  }\n  section.section-header .eyebrow { font-size: 18px; margin-bottom: 24px; }\n  section.section-header .title {\n    font-size: 100px;\n    line-height: 1;\n    margin-bottom: 28px;\n    max-width: 1500px;\n  }\n  section.section-header .subtitle { font-size: 30px; max-width: 1200px; }\n\n  /* Closing slide */\n  section.closing {\n    align-items: center;\n    justify-content: center;\n    text-align: center;\n  }\n  section.closing .closing-mark {\n    height: 56px;\n    margin-bottom: 40px;\n    opacity: 0.4;\n  }\n  section.closing .closing-line {\n    font-family: var(--font-serif);\n    font-style: italic;\n    font-size: 56px;\n    color: var(--text-secondary);\n    line-height: 1.2;\n    margin-bottom: 56px;\n    max-width: 1100px;\n  }\n  section.closing .closing-meta {\n    font-family: var(--font-mono);\n    font-size: 14px;\n    font-weight: var(--weight-medium);\n    letter-spacing: var(--tracking-wider);\n    text-transform: uppercase;\n    color: var(--text-muted);\n  }\n  section.closing .closing-meta p { margin: 4px 0; }\n\n  /* Two-column layout */\n  .two-col {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 56px;\n    align-items: start;\n  }\n  .col-title {\n    font-family: var(--font-sans);\n    font-size: 28px;\n    font-weight: var(--weight-semibold);\n    color: var(--text-primary);\n    margin-bottom: 18px;\n    letter-spacing: var(--tracking-tight);\n  }\n</style>\n</head>\n<body style=\"\">\n\n<deck-stage width=\"1920\" height=\"1080\" style=\"--deck-rail-w: 188px;\">\n\n  <!-- ===================== SLIDE 1 — COVER ===================== -->\n  <section class=\"cover with-grid\" data-label=\"Capa\">\n    \n    <div class=\"cover-logo\" style=\"height: 110px; margin-bottom: 72px; display: flex; align-items: center;\">\n      <img src=\"report-assets/logo.png\" style=\"height: 100%; width: auto;\">\n    </div>\n    <h1 class=\"cover-headline\" style=\"margin-bottom: 0;\">Consultoria de posicionamento e <em>receita</em>.</h1>\n  </section>\n\n  <!-- ===================== SLIDE 2 — 01 PONTO DE PARTIDA ===================== -->\n  <section data-label=\"Ponto de partida\">\n    <span class=\"eyebrow\">01 — Ponto de partida</span>\n    <h2 class=\"title\">Três travessias que toda marca pessoal de alto nível <em>precisa resolver ao mesmo tempo</em>.</h2>\n    <p class=\"subtitle\">A maioria das consultorias resolve uma. A mais completa resolve duas. O sistema precisa resolver as três em paralelo — ou nenhuma se sustenta no tempo.</p>\n\n    <div class=\"pillar-grid\" style=\"margin-top: 56px;\">\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">Travessia 01</span>\n        <h4>Posicionamento</h4>\n        <p>Quem é você para o mercado, de que causa fala, para quem fala e em que categoria é referência. Sem isso, o conteúdo vira ruído e o produto vira commodity.</p>\n      </div>\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">Travessia 02</span>\n        <h4>Receita</h4>\n        <p>Como o posicionamento vira escada de produto, precificação justa, canais de aquisição previsíveis e conversão em vendas reais. Sem isso, autoridade não paga conta.</p>\n      </div>\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">Travessia 03</span>\n        <h4>Distribuição com dados</h4>\n        <p>Como garantir que cada peça publicada está sendo lida, medida e otimizada contra benchmarks reais de viralidade. Sem isso, é achismo e a curva estagna.</p>\n      </div>\n    </div>\n\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>01 · Ponto de partida</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 3 — PREMISSA QUOTE ===================== -->\n  <section class=\"surface section-header\" data-label=\"Premissa\">\n    <span class=\"eyebrow\">Premissa</span>\n    <div class=\"quote-block\" style=\"font-size: 56px; max-width: 1500px; padding: 48px 0 40px 56px;\">\n      Marca pessoal sem sistema de dados é narrativa. Sistema de dados sem marca pessoal é painel. A travessia só acontece quando marca, receita e plataforma operam na <em>mesma esteira</em>.\n      <span class=\"attribution\">Premissa Fleway</span>\n    </div>\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>01 · Premissa</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 4 — 02 METODOLOGIA OPENER ===================== -->\n  <section data-label=\"Metodologia — opener\">\n    <span class=\"eyebrow\">02 — Metodologia</span>\n    <h2 class=\"title\">Dez eixos de diagnóstico. <em>Uma única esteira de decisão.</em></h2>\n    <p class=\"subtitle\">A Fleway opera sobre uma base de 138 livros e 215 frameworks autorais indexados, organizados em dez eixos de análise. Cada eixo alimenta o próximo. Nenhuma decisão visual é tomada antes da estratégica, nenhum conteúdo é escrito antes do tom de voz estar definido.</p>\n\n    <div class=\"meta-strip\" style=\"margin-top: 80px;\">\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">Livros indexados</div>\n        <div class=\"meta-value\">138</div>\n      </div>\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">Frameworks autorais</div>\n        <div class=\"meta-value\">215</div>\n      </div>\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">Eixos de análise</div>\n        <div class=\"meta-value\">10</div>\n      </div>\n      <div class=\"meta-item\">\n        <div class=\"meta-label\">Esteira</div>\n        <div class=\"meta-value\">Sequencial</div>\n      </div>\n    </div>\n\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>02 · Metodologia</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 5 — 02 OS DEZ EIXOS ===================== -->\n  <section class=\"surface\" data-label=\"Os dez eixos\">\n    <span class=\"eyebrow\">02 — Metodologia</span>\n    <h2 class=\"title\" style=\"font-size: 52px; margin-bottom: 40px;\">Os dez eixos do diagnóstico Fleway.</h2>\n\n    <div class=\"layer-list\">\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">01</span>\n        <div class=\"layer-content\">\n          <h4>Essência</h4>\n          <p>Backstory, mapa de histórias pessoais e empresariais, track record, epiphany bridge.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">02</span>\n        <div class=\"layer-content\">\n          <h4>ICP e público-alvo</h4>\n          <p>Perfil demográfico, psicográfico, nível de consciência e sofisticação. ICPs prioritário e secundários.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">03</span>\n        <div class=\"layer-content\">\n          <h4>Posicionamento de mercado</h4>\n          <p>Mapa de concorrentes, análise de categoria, diferenciação e big idea.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">04</span>\n        <div class=\"layer-content\">\n          <h4>Marca pessoal</h4>\n          <p>Arquétipo dominante e auxiliares, identidade do personagem, elementos do avatar.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">05</span>\n        <div class=\"layer-content\">\n          <h4>Movimento</h4>\n          <p>Manifesto, inimigo comum, nova oportunidade, estágio no ciclo de ascensão.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">06</span>\n        <div class=\"layer-content\">\n          <h4>Tom de voz e linguagem</h4>\n          <p>Padrões léxicos, vocabulário tribal, regras de do/don't, exemplos aplicados.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">07</span>\n        <div class=\"layer-content\">\n          <h4>Produto e oferta</h4>\n          <p>Mapa de produtos, Value Equation por oferta, escada recomendada e oferta principal estruturada.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">08</span>\n        <div class=\"layer-content\">\n          <h4>Identidade visual</h4>\n          <p>Paleta, tipografia, estilo de imagem e direção visual. Brandbook aplicável.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">09</span>\n        <div class=\"layer-content\">\n          <h4>Presença digital</h4>\n          <p>Auditoria de perfis, bio, destaques, foto. Recomendação de papel por rede.</p>\n        </div>\n      </div>\n      <div class=\"layer-item\">\n        <span class=\"layer-num\">10</span>\n        <div class=\"layer-content\">\n          <h4>Linha editorial</h4>\n          <p>Assuntos, formatos, objetivos, ICPs e calendário mensal. O plano prático do dia a dia.</p>\n        </div>\n      </div>\n    </div>\n\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>02 · Os dez eixos</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 6 — 03 SISTEMA FLEWAY ===================== -->\n  <section data-label=\"Sistema Fleway\">\n    <span class=\"eyebrow\">03 — Sistema Fleway</span>\n    <h2 class=\"title\" style=\"font-size: 56px; margin-bottom: 24px;\">Quatro fases de voo. <em>Cockpit ligado desde o primeiro mês.</em></h2>\n    <p class=\"subtitle\" style=\"font-size: 24px; margin-bottom: 24px;\">Operação dividida em quatro fases, com encontros a cada 30 dias após a entrega da estratégia. A plataforma Fleway coleta dados em paralelo desde a terceira semana, nenhum mês passa sem leitura e ajuste.</p>\n\n    <div class=\"flight-diagram\">\n      <svg class=\"flight-curve\" viewBox=\"0 0 1000 280\" preserveAspectRatio=\"none\">\n        <defs>\n          <linearGradient id=\"curveGrad\" x1=\"0%\" y1=\"100%\" x2=\"100%\" y2=\"0%\">\n            <stop offset=\"0%\" stop-color=\"#2563EB\" stop-opacity=\"0.40\"></stop>\n            <stop offset=\"100%\" stop-color=\"#93B5FD\" stop-opacity=\"0.95\"></stop>\n          </linearGradient>\n          <linearGradient id=\"curveFill\" x1=\"0%\" y1=\"0%\" x2=\"0%\" y2=\"100%\">\n            <stop offset=\"0%\" stop-color=\"#2563EB\" stop-opacity=\"0.14\"></stop>\n            <stop offset=\"100%\" stop-color=\"#2563EB\" stop-opacity=\"0\"></stop>\n          </linearGradient>\n        </defs>\n        <path d=\"M 40 245 C 180 238, 280 210, 340 180 C 440 140, 540 110, 640 80 C 760 50, 860 32, 960 22\" stroke=\"url(#curveGrad)\" stroke-width=\"3\" fill=\"none\" stroke-linecap=\"round\"></path>\n        <path d=\"M 40 245 C 180 238, 280 210, 340 180 C 440 140, 540 110, 640 80 C 760 50, 860 32, 960 22 L 960 280 L 40 280 Z\" fill=\"url(#curveFill)\"></path>\n      </svg>\n      <div class=\"flight-marker\" style=\"top: 80%; left: 4%;\">\n        <div class=\"flight-marker-dot\"></div>\n        <div class=\"flight-marker-label\">Decolagem</div>\n        <div class=\"flight-marker-time\">Mês 1</div>\n      </div>\n      <div class=\"flight-marker\" style=\"top: 58%; left: 30%;\">\n        <div class=\"flight-marker-dot\"></div>\n        <div class=\"flight-marker-label\">Ascensão</div>\n        <div class=\"flight-marker-time\">Mês 2 · 3</div>\n      </div>\n      <div class=\"flight-marker\" style=\"top: 28%; left: 63%;\">\n        <div class=\"flight-marker-dot\"></div>\n        <div class=\"flight-marker-label\">Cruzeiro</div>\n        <div class=\"flight-marker-time\">Mês 4 · 11</div>\n      </div>\n      <div class=\"flight-marker\" style=\"top: 4%; left: 95%;\">\n        <div class=\"flight-marker-dot\"></div>\n        <div class=\"flight-marker-label\">Travessia</div>\n        <div class=\"flight-marker-time\">Mês 12</div>\n      </div>\n    </div>\n\n    <div class=\"phase-grid\">\n      <div class=\"phase-card\">\n        <div class=\"phase-header\"><div class=\"phase-name\" style=\"\">Decolagem - to know</div><div class=\"phase-time\">30 dias</div></div>\n        <div class=\"phase-desc\">Onboarding intensivo. Coleta, escuta, diagnóstico e ativação da plataforma.</div>\n        <ul class=\"phase-deliverables\">\n          <li>Pré-Voo (check-up)</li>\n          <li>Sondagem Profunda (6h)</li>\n          <li style=\"\">Diagnóstico Fleway (relatório)</li>\n          <li style=\"\">Plataforma Cockpit ativada</li>\n        </ul>\n        <div class=\"phase-encounters\"><strong style=\"\">2</strong> encontros</div>\n      </div>\n      <div class=\"phase-card highlight\">\n        <div class=\"phase-header\"><div class=\"phase-name\" style=\"\">Ascensão - to do</div><div class=\"phase-time\">60 dias</div></div>\n        <div class=\"phase-desc\" style=\"\">Construção do sistema completo. Posicionamento, receita, canais e primeira rodada de produção.</div>\n        <ul class=\"phase-deliverables\">\n          <li style=\"\">Estratégia de Posicionamento</li>\n          <li style=\"\">Estratégia de Receita</li>\n          <li style=\"\">Estratégia de Canais</li>\n          <li style=\"\">Entrega de 90 vídeos (Roteiro até Postagem)</li>\n        </ul>\n        <div class=\"phase-encounters\"><strong style=\"\">5</strong> encontros</div>\n      </div>\n      <div class=\"phase-card\">\n        <div class=\"phase-header\"><div class=\"phase-name\" style=\"\">Cruzeiro - to watch</div><div class=\"phase-time\">8 meses</div></div>\n        <div class=\"phase-desc\" style=\"\">Operação em regime com dados. Encontros mensais, ajuste contínuo e amplificação.</div>\n        <ul class=\"phase-deliverables\">\n          <li style=\"\">Encontros a cada 30 dias - checkpoint</li>\n          <li style=\"\">Tutorias com o time</li>\n          <li style=\"\">Aulas semanais</li>\n          <li style=\"\">Análise constante</li>\n        </ul>\n        <div class=\"phase-encounters\" style=\"\"><strong style=\"\">8</strong> encontros</div>\n      </div>\n      <div class=\"phase-card\">\n        <div class=\"phase-header\"><div class=\"phase-name\">Travessia</div><div class=\"phase-time\">30 dias</div></div>\n        <div class=\"phase-desc\">Consolidação anual. Leitura completa dos 12 meses e definição do próximo ciclo.</div>\n        <ul class=\"phase-deliverables\">\n          <li>Relatório anual</li>\n          <li>Ajuste de arquitetura</li>\n          <li>Plano do próximo ciclo</li>\n        </ul>\n        <div class=\"phase-encounters\" style=\"\"><strong style=\"\">1</strong> encontro</div>\n      </div>\n    </div>\n\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>03 · Sistema Fleway</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 7 — RITMO DO PROGRAMA ===================== -->\n  <section class=\"surface\" data-label=\"Ritmo do programa\">\n    <span class=\"eyebrow\">03 — Ritmo do programa</span>\n    <h2 class=\"title\">Cockpit ativo na semana 3. <em>Acompanhamento sem janela morta.</em></h2>\n\n    <div class=\"cockpit-strip\" style=\"margin: 40px 0;\">\n      <div class=\"cockpit-strip-dot\"></div>\n      <div class=\"cockpit-strip-text\" style=\"\">\n        <strong>Cockpit Fleway ativo a partir da semana 3.</strong> A plataforma já começa a puxar dados das redes antes mesmo do relatório de diagnóstico estar pronto. O sistema opera em paralelo às quatro fases — sem janela morta entre onboarding e leitura.\n      </div>\n    </div>\n\n    <div class=\"meta-strip\" style=\"margin-top: 56px; opacity: 0;\">\n      <div class=\"meta-item\" style=\"opacity: 0; color: rgba(111, 130, 160, 0);\">\n        <div class=\"meta-label\" style=\"\"><br></div>\n        <div class=\"meta-value\" style=\"\"><br></div>\n      </div>\n      <div class=\"meta-item\" style=\"line-height: 0; opacity: 0;\">\n        <div class=\"meta-label\" style=\"\"><br></div>\n        <div class=\"meta-value\" style=\"\"><br></div>\n      </div>\n      <div class=\"meta-item\" style=\"border-width: 0px;\">\n        <div class=\"meta-label\" style=\"\"><br></div>\n        <div class=\"meta-value\" style=\"\"><br></div>\n      </div>\n      <div class=\"meta-item\" style=\"opacity: 0;\">\n        <div class=\"meta-label\" style=\"\"><br></div>\n        <div class=\"meta-value\" style=\"\"><br></div>\n      </div>\n    </div>\n\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>03 · Ritmo</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 8 — 04 DECOLAGEM ===================== -->\n  <section data-label=\"Decolagem\">\n    <span class=\"eyebrow\">Fase 01 — Decolagem</span>\n    <h2 class=\"title\">Pré-Voo. Sondagem. <em>Leitura Fleway.</em></h2>\n    <p class=\"subtitle\">Os primeiros 30 dias são de escuta e leitura. Seis horas de Sondagem gravadas e processadas contra os 215 frameworks do repositório Fleway. Na mesma janela, o Cockpit é ligado e começa a puxar dados históricos das redes.</p>\n\n    <div class=\"pillar-grid\" style=\"margin-top: 56px;\">\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">Pré-Voo</span>\n        <h4>Coleta e check-up</h4>\n        <p>Antes da entrevista, coleta de dados objetivos:</p>\n        <ul>\n          <li>Receita 12 meses por produto</li>\n          <li>Mapa de canais e leads</li>\n          <li>Histórico de conversão</li>\n          <li>Auditoria de perfis</li>\n          <li>Inventário de conteúdo</li>\n        </ul>\n      </div>\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">Sondagem</span>\n        <h4>Entrevista — 6h</h4>\n        <p>Conversa guiada pelos 10 eixos, gravada e transcrita. Cobre:</p>\n        <ul>\n          <li>História pessoal e empresarial</li>\n          <li>Propósito e polarizações</li>\n          <li>Mercado e visão</li>\n          <li>Produto e precificação</li>\n          <li>Canais e execução</li>\n        </ul>\n      </div>\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">Leitura Fleway</span>\n        <h4>Relatório dos 10 eixos</h4>\n        <p>Documento de 40 a 60 páginas contendo:</p>\n        <ul>\n          <li>Análise dos 10 eixos</li>\n          <li>Forças, lacunas, prioridades</li>\n          <li>Frameworks aplicáveis</li>\n          <li>Hipóteses de posicionamento</li>\n          <li>Recomendações por eixo</li>\n        </ul>\n      </div>\n    </div>\n\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>04 · Decolagem</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 9 — DECOLAGEM ENTREGÁVEIS ===================== -->\n  <section class=\"surface\" data-label=\"Decolagem — entregáveis\">\n    <span class=\"eyebrow\">Fase 01 — Decolagem</span>\n    <h2 class=\"title\" style=\"font-size: 56px;\">O que você recebe nos primeiros <em>30 dias</em>.</h2>\n\n    <div class=\"table-wrap\" style=\"margin-top: 32px;\">\n      <table>\n        <thead>\n          <tr><th>Entregável</th><th>Formato</th><th>Quando</th></tr>\n        </thead>\n        <tbody>\n          <tr><td>Pré-Voo (check-up do negócio)</td><td>Planilha estruturada</td><td>Semana 01</td></tr>\n          <tr><td>Sondagem Profunda</td><td>Vídeo + transcrição</td><td>Semana 02</td></tr>\n          <tr><td>Cockpit Fleway ativado</td><td>Plataforma integrada às redes</td><td>Semana 03</td></tr>\n          <tr><td>Leitura Fleway</td><td>PDF + slides</td><td>Semana 04</td></tr>\n          <tr><td>Call de validação</td><td>Reunião gravada</td><td>Semana 04</td></tr>\n        </tbody>\n      </table>\n    </div>\n\n    <div class=\"slide-footer\">\n      <div class=\"fwm\">\n        <img src=\"report-assets/logo.png\" style=\"height: 24px; width: auto; opacity: 0.8;\">\n        <span>Fleway · 2026</span>\n      </div>\n      <span>04 · Entregáveis</span>\n    </div>\n  </section>\n\n  <!-- ===================== SLIDE 11 — CÓDIGO FLEWAY ===================== -->\n  <section class=\"surface\" data-label=\"Código Fleway\">\n    <span class=\"eyebrow\">Ascensão · Doc 01</span>\n    <h2 class=\"title\" style=\"font-size: 56px;\">Estratégia de posicionamento — o <em>brandbook aplicável.</em></h2>\n    <p class=\"subtitle\" style=\"margin-bottom: 32px;\">Documento-mãe da fase. Define se uma decisão de comunicação está dentro ou fora da marca, do roteiro de um Reels até a paleta de um slide. Aqui você tem a clareza que sempre precisou.</p>\n\n    <div class=\"card-grid\">\n      <div class=\"card\">\n        <div class=\"card-eyebrow\">01</div>\n        <h4>Arquétipo e personagem</h4>\n        <p>Arquétipo dominante, aliados e blindspot. Identidade do attractive character e polarizações principais.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-eyebrow\">02</div>\n        <h4>Manifesto e movimento</h4>\n        <p>Big idea, causa, inimigo comum, nova oportunidade. A bandeira que alinha conteúdo e produto.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-eyebrow\">03</div>\n        <h4>Tom de voz</h4>\n        <p>Guia de linguagem com padrões léxicos, exemplos, do/don't e vocabulário tribal da marca.</p>\n      </div>\n      <div class=\"card\">\n        <div class=\"card-eyebrow\">04</div>\n
